<!doctype html>
<html lang="en">
  <head>

    <title>RICON Storyline | Chapter Not Found</title>

      :root { color-scheme: dark; }

        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;

      .card {

        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(12,12,12,0.76);
        padding: 30px 24px;
        text-align: center;
      }
      .kicker { font-size: 11px; letter-spacing: 0.24em; color: #7bc8e8; margin-bottom: 10px; }
      h1 { margin: 0 0 12px; font-size: clamp(42px, 9vw, 72px); letter-spacing: 0.08em; line-height: 0.95; color: #c9a84c; }
      p { margin: 0 0 18px; line-height: 1.6; color: rgba(240,235,227,0.72); }
      a {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 18px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-decoration: none;
        color: #080808;
        background: linear-gradient(135deg, #c9a84c, #ffd87a);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="kicker">RICON STORYLINE · NOT FOUND</div>
